# Netlify 設定ファイル
# ドキュメント: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # 関数ディレクトリ
  functions = "netlify/functions"

  # ビルドコマンド（stripe SDKのインストール）
  command = "npm install"

  # 公開ディレクトリ（HTMLファイルが置いてあるルート）
  publish = "."

# ── 関数の設定 ────────────────────────────
[functions]
  node_bundler = "esbuild"

# ── セキュリティヘッダー ──────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── リダイレクト（SPAではないので最低限のみ） ──
[[redirects]]
  from  = "/api/create-checkout"
  to    = "/.netlify/functions/create-checkout"
  status = 200
